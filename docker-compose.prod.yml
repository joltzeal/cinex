version: '3.8'

services:
  cinex:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: cinex
    ports:
      - "3000:3000"
    environment:
      # Node.js 环境配置
      - NODE_ENV=production
      - ENABLE_SCHEDULER=true
      - DATABASE_URL=postgresql://cinex:cinex@postgres:5432/cinex?schema=public
      - DEFAULT_SUBSCRIBE_MAX_PAGES=100
      - DEFAULT_SUBSCRIBE_DELAY_MS=1000
      - AUTH_TRUST_HOST=true
      - RUN_MIGRATIONS=true  # 启动时运行数据库迁移
      
      # 应用 URL 配置 - 生产环境
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXTJS_URL=http://localhost:3000  # Cron 调度器使用的 URL
      
      # 认证配置
      - NEXTAUTH_SECRET=xemRs422hgU5TnPI/6Cx9qbz1FrBb1UE4yBBtsTIVUA=
      - NEXTAUTH_URL=http://localhost:3000
      
      # 代理配置（如需要）
      # - HTTP_PROXY=http://your-proxy:port
      # - HTTPS_PROXY=http://your-proxy:port
      
      # API 配置
      - METATUBE_API_HOST=https://rich-coralyn-ameno-7c7b1b86.koyeb.app
      - METATUBE_API_TOKEN=bravesfly
      
    volumes:
      # 挂载媒体目录到宿主机
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cinex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:14-alpine
    container_name: cinex-db
    environment:
      - POSTGRES_DB=cinex
      - POSTGRES_USER=cinex
      - POSTGRES_PASSWORD=cinex
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      # 将数据库数据挂载到本地 ./db 目录
      - ./db:/var/lib/postgresql/data
    networks:
      - cinex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinex -d cinex"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # 可选：限制资源使用
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  cinex-network:
    driver: bridge

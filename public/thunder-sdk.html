<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迅雷下载SDK</title>
</head>
<body>
    <!-- 迅雷下载SDK -->
    <script src="https://open.thunderurl.com/thunder-link-2.0.js"></script>
    <script>
        // 检查SDK是否加载成功
        window.addEventListener('load', function() {
            if (window.thunderLink) {
                console.log('迅雷SDK加载成功');
                // 触发自定义事件通知主应用
                window.dispatchEvent(new CustomEvent('thunder-loaded'));
            } else {
                console.warn('迅雷SDK加载失败');
            }
        });

        // 提供全局的迅雷下载函数
        window.thunderDownload = function(tasks, options = {}) {
            if (!window.thunderLink) {
                throw new Error('迅雷SDK未加载');
            }

            return window.thunderLink.newTask({
                downloadDir: options.downloadDir || 'cinex下载',
                taskGroupName: options.taskGroupName || '下载任务',
                tasks: tasks
            });
        };
    </script>
</body>
</html>
